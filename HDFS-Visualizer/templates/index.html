<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HDFS Web Management Console</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&family=Syne:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg-page:      #0d1117;
      --bg-surface:   #161b22;
      --bg-card:      #1c2333;
      --bg-input:     #0d1117;
      --border:       rgba(255,255,255,0.08);
      --border-hover: rgba(255,255,255,0.16);
      --text-primary: #e6edf3;
      --text-muted:   #7d8590;
      --text-dim:     #484f58;
      --accent-blue:  #388bfd;
      --accent-sky:   #58a6ff;
      --accent-green: #3fb950;
      --accent-red:   #f85149;
      --accent-amber: #d29922;
      --accent-purple:#a5a3ff;
      --accent-cyan:  #39d353;
      --font-ui:      'Syne', sans-serif;
      --font-mono:    'JetBrains Mono', monospace;
      --radius-sm: 6px;
      --radius-md: 10px;
      --radius-lg: 14px;
    }

    html, body {
      height: 100%;
      background: var(--bg-page);
      color: var(--text-primary);
      font-family: var(--font-ui);
      font-size: 14px;
      line-height: 1.5;
    }

    /* ─── Layout ───────────────────────────────── */
    .app-shell {
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    /* ─── Topbar ────────────────────────────────── */
    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 24px;
      height: 56px;
      background: var(--bg-surface);
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .topbar-brand {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .brand-icon {
      width: 32px;
      height: 32px;
      background: linear-gradient(135deg, #1f6feb 0%, #388bfd 100%);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      color: #fff;
    }

    .brand-name {
      font-size: 15px;
      font-weight: 600;
      color: var(--text-primary);
      letter-spacing: -0.01em;
    }

    .brand-badge {
      font-size: 10px;
      font-weight: 500;
      color: var(--accent-sky);
      background: rgba(56, 139, 253, 0.12);
      border: 1px solid rgba(56, 139, 253, 0.3);
      padding: 2px 7px;
      border-radius: 999px;
      font-family: var(--font-mono);
    }

    .topbar-meta {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .status-pill {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      color: var(--text-muted);
    }

    .status-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--accent-green);
      box-shadow: 0 0 0 2px rgba(63, 185, 80, 0.25);
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { box-shadow: 0 0 0 2px rgba(63, 185, 80, 0.25); }
      50% { box-shadow: 0 0 0 5px rgba(63, 185, 80, 0.1); }
    }

    /* ─── Main content ──────────────────────────── */
    .main-content {
      display: grid;
      grid-template-columns: 420px 1fr;
      gap: 0;
      flex: 1;
      overflow: hidden;
    }

    /* ─── Left sidebar panels ───────────────────── */
    .sidebar {
      border-right: 1px solid var(--border);
      overflow-y: auto;
      padding: 20px 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .sidebar::-webkit-scrollbar { width: 4px; }
    .sidebar::-webkit-scrollbar-track { background: transparent; }
    .sidebar::-webkit-scrollbar-thumb { background: var(--border); border-radius: 999px; }

    /* ─── Cards ─────────────────────────────────── */
    .card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      overflow: hidden;
      transition: border-color 0.2s;
    }

    .card:hover { border-color: var(--border-hover); }

    .card-header {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 12px 16px 10px;
      border-bottom: 1px solid var(--border);
    }

    .card-header-icon {
      font-size: 16px;
      line-height: 1;
    }

    .card-header-title {
      font-size: 12px;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    .card-body {
      padding: 14px 16px;
    }

    /* ─── Form elements ─────────────────────────── */
    .form-group {
      margin-bottom: 10px;
    }

    .form-group:last-child { margin-bottom: 0; }

    .form-label {
      display: block;
      font-size: 11px;
      font-weight: 500;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 5px;
    }

    .form-input {
      width: 100%;
      padding: 8px 11px;
      background: var(--bg-input);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text-primary);
      font-family: var(--font-mono);
      font-size: 12.5px;
      outline: none;
      transition: border-color 0.15s, box-shadow 0.15s;
    }

    .form-input::placeholder { color: var(--text-dim); }

    .form-input:focus {
      border-color: var(--accent-blue);
      box-shadow: 0 0 0 3px rgba(56, 139, 253, 0.15);
    }

    /* ─── Button Groups ─────────────────────────── */
    .btn-row {
      display: flex;
      gap: 7px;
      flex-wrap: wrap;
      margin-top: 11px;
    }

    .btn-grid {
      display: grid;
      gap: 7px;
      margin-top: 11px;
    }

    .btn-grid-2 { grid-template-columns: 1fr 1fr; }
    .btn-grid-3 { grid-template-columns: 1fr 1fr 1fr; }

    /* ─── Buttons ───────────────────────────────── */
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 5px;
      padding: 7px 13px;
      border: 1px solid transparent;
      border-radius: var(--radius-sm);
      font-family: var(--font-ui);
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.15s ease;
      white-space: nowrap;
      outline: none;
    }

    .btn:active { transform: scale(0.97); }

    .btn i { font-size: 14px; }

    .btn-full { width: 100%; }

    /* Variants */
    .btn-default {
      background: rgba(255,255,255,0.05);
      border-color: var(--border);
      color: var(--text-primary);
    }
    .btn-default:hover {
      background: rgba(255,255,255,0.09);
      border-color: var(--border-hover);
    }

    .btn-green {
      background: rgba(63, 185, 80, 0.12);
      border-color: rgba(63, 185, 80, 0.35);
      color: #4ac959;
    }
    .btn-green:hover { background: rgba(63, 185, 80, 0.2); }

    .btn-red {
      background: rgba(248, 81, 73, 0.12);
      border-color: rgba(248, 81, 73, 0.35);
      color: #f85149;
    }
    .btn-red:hover { background: rgba(248, 81, 73, 0.2); }

    .btn-blue {
      background: rgba(56, 139, 253, 0.12);
      border-color: rgba(56, 139, 253, 0.35);
      color: var(--accent-sky);
    }
    .btn-blue:hover { background: rgba(56, 139, 253, 0.2); }

    .btn-purple {
      background: rgba(165, 163, 255, 0.1);
      border-color: rgba(165, 163, 255, 0.3);
      color: var(--accent-purple);
    }
    .btn-purple:hover { background: rgba(165, 163, 255, 0.18); }

    .btn-amber {
      background: rgba(210, 153, 34, 0.12);
      border-color: rgba(210, 153, 34, 0.35);
      color: #e3b341;
    }
    .btn-amber:hover { background: rgba(210, 153, 34, 0.2); }

    .btn-cyan {
      background: rgba(57, 211, 83, 0.1);
      border-color: rgba(57, 211, 83, 0.3);
      color: #56d364;
    }
    .btn-cyan:hover { background: rgba(57, 211, 83, 0.18); }

    /* ─── Terminal area ─────────────────────────── */
    .terminal-pane {
      display: flex;
      flex-direction: column;
      padding: 20px;
      gap: 12px;
    }

    .terminal-wrap {
      flex: 1;
      display: flex;
      flex-direction: column;
      background: #010409;
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: var(--radius-lg);
      overflow: hidden;
      min-height: 0;
    }

    .terminal-titlebar {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 16px;
      background: rgba(255,255,255,0.03);
      border-bottom: 1px solid rgba(255,255,255,0.06);
      flex-shrink: 0;
    }

    .traffic-lights {
      display: flex;
      gap: 5px;
    }

    .tl {
      width: 11px;
      height: 11px;
      border-radius: 50%;
    }
    .tl-red { background: #ff5f57; }
    .tl-yellow { background: #febc2e; }
    .tl-green { background: #28c840; }

    .terminal-tab {
      font-size: 11px;
      font-family: var(--font-mono);
      color: var(--text-muted);
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 4px;
      padding: 2px 10px;
    }

    .terminal-body {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
    }

    .terminal-body::-webkit-scrollbar { width: 4px; }
    .terminal-body::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 999px; }

    .terminal-prompt-line {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 8px;
    }

    .prompt-user { color: #58a6ff; font-family: var(--font-mono); font-size: 13px; font-weight: 500; }
    .prompt-at   { color: var(--text-dim); font-family: var(--font-mono); font-size: 13px; }
    .prompt-host { color: #3fb950; font-family: var(--font-mono); font-size: 13px; font-weight: 500; }
    .prompt-dir  { color: #a5a3ff; font-family: var(--font-mono); font-size: 13px; }
    .prompt-sym  { color: #7d8590; font-family: var(--font-mono); font-size: 13px; }
    .prompt-cmd  { color: #e6edf3; font-family: var(--font-mono); font-size: 13px; word-break: break-all; }

    .terminal-output {
      font-family: var(--font-mono);
      font-size: 13px;
      color: #8b949e;
      white-space: pre-wrap;
      word-break: break-word;
      line-height: 1.65;
      padding-left: 2px;
    }

    .terminal-output.has-output {
      color: #adbac7;
    }

    .terminal-output.waiting {
      color: var(--text-dim);
      font-style: italic;
    }

    /* Custom command input area */
    .terminal-input-bar {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 16px;
      border-top: 1px solid rgba(255,255,255,0.06);
      background: rgba(255,255,255,0.02);
      flex-shrink: 0;
    }

    .terminal-input-bar .prompt-sym { user-select: none; flex-shrink: 0; }

    .terminal-cmd-input {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      color: var(--text-primary);
      font-family: var(--font-mono);
      font-size: 13px;
      caret-color: var(--accent-green);
    }

    .terminal-cmd-input::placeholder { color: var(--text-dim); }

    .terminal-run-btn {
      display: flex;
      align-items: center;
      gap: 4px;
      padding: 5px 12px;
      background: rgba(56, 139, 253, 0.15);
      border: 1px solid rgba(56, 139, 253, 0.3);
      border-radius: 5px;
      color: var(--accent-sky);
      font-family: var(--font-ui);
      font-size: 11px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.15s;
    }
    .terminal-run-btn:hover { background: rgba(56, 139, 253, 0.25); }
    .terminal-run-btn i { font-size: 13px; }

    /* ─── Section divider label ─────────────────── */
    .section-label {
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text-dim);
      padding: 4px 0 8px;
    }

    /* ─── Inline form rows ──────────────────────── */
    .two-col {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }
  </style>
</head>
<body>
<div class="app-shell">

  <!-- ── Topbar ── -->
  <header class="topbar">
    <div class="topbar-brand">
      <div class="brand-icon"><i class="ti ti-server-2" aria-hidden="true"></i></div>
      <span class="brand-name">HDFS Console</span>
      <span class="brand-badge">v2.0</span>
    </div>
    <div class="topbar-meta">
      <div class="status-pill">
        <div class="status-dot"></div>
        <span>Hadoop cluster</span>
      </div>
    </div>
  </header>

  <!-- ── Main ── -->
  <div class="main-content">

    <!-- ── LEFT: control panels ── -->
    <aside class="sidebar">

      <!-- Cluster Control -->
      <div class="card">
        <div class="card-header">
          <i class="ti ti-topology-star-3 card-header-icon" style="color:#58a6ff;" aria-hidden="true"></i>
          <span class="card-header-title">Cluster Control</span>
        </div>
        <div class="card-body">
          <div class="btn-grid btn-grid-2">
            <form method="POST" style="display:contents;">
              <input type="hidden" name="command" value="start-dfs.sh" />
              <button class="btn btn-green"><i class="ti ti-player-play"></i> Start DFS</button>
            </form>
            <form method="POST" style="display:contents;">
              <input type="hidden" name="command" value="start-yarn.sh" />
              <button class="btn btn-green"><i class="ti ti-player-play"></i> Start YARN</button>
            </form>
            <form method="POST" style="display:contents;">
              <input type="hidden" name="command" value="stop-dfs.sh" />
              <button class="btn btn-red"><i class="ti ti-player-stop"></i> Stop DFS</button>
            </form>
            <form method="POST" style="display:contents;">
              <input type="hidden" name="command" value="stop-yarn.sh" />
              <button class="btn btn-red"><i class="ti ti-player-stop"></i> Stop YARN</button>
            </form>
          </div>
          <div style="margin-top:7px;">
            <form method="POST">
              <input type="hidden" name="command" value="jps" />
              <button class="btn btn-default btn-full"><i class="ti ti-list-details"></i> Check JPS processes</button>
            </form>
          </div>
        </div>
      </div>

      <!-- Browse & View -->
      <div class="card">
        <div class="card-header">
          <i class="ti ti-folder-open card-header-icon" style="color:#a5a3ff;" aria-hidden="true"></i>
          <span class="card-header-title">Browse &amp; View</span>
        </div>
        <div class="card-body">
          <form method="POST">
            <div class="form-group">
              <label class="form-label">HDFS target path</label>
              <input class="form-input" type="text" name="path_entry" value="{{ last_path }}" placeholder="/user/hadoop/data" />
            </div>
            <div class="btn-grid btn-grid-2">
              <button type="submit" name="action" value="ls" class="btn btn-purple">
                <i class="ti ti-list"></i> List (ls)
              </button>
              <button type="submit" name="action" value="cat" class="btn btn-default">
                <i class="ti ti-eye"></i> View (cat)
              </button>
            </div>
          </form>
        </div>
      </div>

      <!-- Copy / Move -->
      <div class="card">
        <div class="card-header">
          <i class="ti ti-copy card-header-icon" style="color:#39d4d4;" aria-hidden="true"></i>
          <span class="card-header-title">Copy &amp; Move</span>
        </div>
        <div class="card-body">
          <form method="POST">
            <div class="form-group">
              <label class="form-label">Source path</label>
              <input class="form-input" type="text" name="src_entry" placeholder="/hdfs/source/path" />
            </div>
            <div class="form-group">
              <label class="form-label">Destination path</label>
              <input class="form-input" type="text" name="dst_entry" placeholder="/hdfs/dest/path" />
            </div>
            <div class="btn-grid btn-grid-2">
              <button type="submit" name="action" value="cp" class="btn btn-blue">
                <i class="ti ti-copy"></i> Copy (cp)
              </button>
              <button type="submit" name="action" value="mv" class="btn btn-default">
                <i class="ti ti-arrows-exchange"></i> Move (mv)
              </button>
            </div>
          </form>
        </div>
      </div>

      <!-- File Transfer -->
      <div class="card">
        <div class="card-header">
          <i class="ti ti-transfer card-header-icon" style="color:#3fb950;" aria-hidden="true"></i>
          <span class="card-header-title">File Transfer</span>
        </div>
        <div class="card-body">
          <form method="POST">
            <div class="form-group">
              <label class="form-label">Local path (host)</label>
              <input class="form-input" type="text" name="local_entry" placeholder="/home/user/file.txt" />
            </div>
            <div class="form-group">
              <label class="form-label">HDFS path (remote)</label>
              <input class="form-input" type="text" name="hdfs_entry" placeholder="/user/hadoop/file.txt" />
            </div>
            <div class="btn-grid btn-grid-3">
              <button type="submit" name="action" value="put" class="btn btn-green">
                <i class="ti ti-upload"></i> Put
              </button>
              <button type="submit" name="action" value="get" class="btn btn-blue">
                <i class="ti ti-download"></i> Get
              </button>
              <button type="submit" name="action" value="append" class="btn btn-amber">
                <i class="ti ti-file-plus"></i> Append
              </button>
            </div>
          </form>
        </div>
      </div>

      <!-- Directory Management -->
      <div class="card">
        <div class="card-header">
          <i class="ti ti-folder card-header-icon" style="color:#e3b341;" aria-hidden="true"></i>
          <span class="card-header-title">Directory Management</span>
        </div>
        <div class="card-body">
          <form method="POST">
            <div class="form-group">
              <label class="form-label">HDFS path</label>
              <input class="form-input" type="text" name="rm_path" placeholder="/user/hadoop/new-dir" />
            </div>
            <div class="btn-grid btn-grid-2">
              <button type="submit" name="action" value="mkdir" class="btn btn-cyan">
                <i class="ti ti-folder-plus"></i> mkdir
              </button>
              <button type="submit" name="action" value="rm" class="btn btn-red">
                <i class="ti ti-trash"></i> rm -r
              </button>
            </div>
          </form>
        </div>
      </div>

    </aside>

    <!-- ── RIGHT: terminal ── -->
    <div class="terminal-pane">
      <div class="terminal-wrap">

        <!-- Titlebar -->
        <div class="terminal-titlebar">
          <div class="traffic-lights">
            <div class="tl tl-red"></div>
            <div class="tl tl-yellow"></div>
            <div class="tl tl-green"></div>
          </div>
          <div class="terminal-tab">output — hdfs@namenode</div>
        </div>

        <!-- Output -->
        <div class="terminal-body">
          <!-- Last command echo -->
          {% if cmd_text != "None" %}
          <div class="terminal-prompt-line">
            <span class="prompt-user">hadoop</span>
            <span class="prompt-at">@</span>
            <span class="prompt-host">namenode</span>
            <span class="prompt-sym">:</span>
            <span class="prompt-dir">~</span>
            <span class="prompt-sym">$</span>
            <span class="prompt-cmd">{{ cmd_text }}</span>
          </div>
          {% endif %}

          <!-- Output block -->
          <pre class="terminal-output {% if output == 'Waiting for command...' %}waiting{% else %}has-output{% endif %}">{{ output }}</pre>
        </div>

        <!-- Custom command input -->
        <form method="POST" class="terminal-input-bar">
          <span class="prompt-sym" style="color:#3fb950; font-family: var(--font-mono); font-size: 13px;">$</span>
          <input
            class="terminal-cmd-input"
            type="text"
            name="command"
            placeholder="Run a custom command (e.g. hdfs dfs -ls /)"
            autocomplete="off"
            spellcheck="false"
          />
          <button type="submit" class="terminal-run-btn">
            <i class="ti ti-player-play"></i> Run
          </button>
        </form>

      </div>
    </div>

  </div><!-- /.main-content -->
</div><!-- /.app-shell -->
</body>
</html>
